nelmio_api_doc:
  documentation:
    info:
      title: Smart Diag Backend API
      description: API for AI-powered diagnostics of Ford vehicles — VIN decoding, fault code analysis, and intelligent repair guidance.
      version: 1.0.0
    tags:
      - name: Client services
        description: Endpoints used by API clients.
      - name: License administration
        description: Endpoints used to manage client licenses.
      - name: AI prompt administration
        description: Endpoints used by administrators to manage AI prompts.
    components:
      securitySchemes:
        BearerAuth:
          type: http
          scheme: bearer
          bearerFormat: JWT
        LicenseKey:
          type: apiKey
          in: header
          name: X-License-Key
        AdminKey:
          type: apiKey
          in: header
          name: X-Admin-Key
      schemas:
        ErrorResponse:
          type: object
          required: [error]
          properties:
            error:
              type: string
              example: missing_license
        LicenseWrite:
          type: object
          required: [clientName, clientEmail, validUntil]
          properties:
            clientName:
              type: string
              example: ACME Inc.
            clientEmail:
              type: string
              format: email
              example: admin@example.com
            note:
              type: string
              nullable: true
              example: Annual license
            validUntil:
              type: string
              format: date-time
              example: '2027-06-21T23:59:59+00:00'
        LicensePatch:
          allOf:
            - $ref: '#/components/schemas/LicenseWrite'
            - type: object
              properties:
                active:
                  type: boolean
                  example: true
        License:
          type: object
          properties:
            id:
              type: integer
              example: 1
            clientName:
              type: string
              example: ACME Inc.
            clientEmail:
              type: string
              example: admin@example.com
            note:
              type: string
              nullable: true
            active:
              type: boolean
              example: true
            validUntil:
              type: string
              format: date-time
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time
            deactivatedAt:
              type: string
              format: date-time
              nullable: true
            deletedAt:
              type: string
              format: date-time
              nullable: true
        LicenseWithKey:
          allOf:
            - $ref: '#/components/schemas/License'
            - type: object
              properties:
                licenseKey:
                  type: string
                  example: lic_0123456789abcdef
        UserResponse:
          type: object
          properties:
            id:
              type: integer
              example: 1
            email:
              type: string
              format: email
              example: admin@example.com
            firstName:
              type: string
              example: Jan
            lastName:
              type: string
              example: Kowalski
            role:
              type: string
              enum: [ROLE_ADMIN, ROLE_EMPLOYEE]
              example: ROLE_ADMIN
            active:
              type: boolean
              example: true
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time
            deletedAt:
              type: string
              format: date-time
              nullable: true
        UserWriteRequest:
          type: object
          required: [email, firstName, lastName, role, password]
          properties:
            email:
              type: string
              format: email
              example: jan.kowalski@example.com
            firstName:
              type: string
              example: Jan
            lastName:
              type: string
              example: Kowalski
            role:
              type: string
              enum: [ROLE_ADMIN, ROLE_EMPLOYEE]
              example: ROLE_EMPLOYEE
            password:
              type: string
              format: password
              minLength: 8
              example: secret123
            active:
              type: boolean
              nullable: true
              example: true
        AiPrompt:
          type: object
          properties:
            id:
              type: integer
              example: 1
            name:
              type: string
              example: VIN analysis
            prompt:
              type: string
              example: Analyze the provided VIN and return diagnostic guidance.
        AiPromptWriteRequest:
          type: object
          required: [name, prompt]
          properties:
            name:
              type: string
              example: VIN analysis
            prompt:
              type: string
              example: Analyze the provided VIN and return diagnostic guidance.
        VinCheckDigitResponse:
          type: object
          required: [valid, actual, expected]
          properties:
            valid:
              type: boolean
              description: >-
                True when the VIN is valid. For EU VINs, expected is null
                because check digit validation is not applicable.
              example: true
            actual:
              type: string
              nullable: true
              example: '0'
            expected:
              type: string
              nullable: true
              example: '0'
        VinDecodeResponse:
          type: object
          required:
            - vin
            - valid
            - ford
            - wmi
            - manufacturer
            - modelYear
            - plantCode
            - serialNumber
            - region
            - model
            - bodyStyle
            - engineCode
            - assemblyPlant
            - productionYear
            - productionMonth
            - errorMessage
            - checkDigit
            - warnings
            - external
          properties:
            vin:
              type: string
              example: 1FA6P8CF0F5300000
            valid:
              type: boolean
              example: true
            ford:
              type: boolean
              example: true
            wmi:
              type: string
              nullable: true
              example: 1FA
            manufacturer:
              type: string
              nullable: true
              example: Ford Motor Company USA
            modelYear:
              type: integer
              nullable: true
              example: 2015
            plantCode:
              type: string
              nullable: true
              example: '5'
            serialNumber:
              type: string
              nullable: true
              example: '300000'
            region:
              type: string
              nullable: true
              example: North America
            model:
              type: string
              nullable: true
              example: 'Series/Line: P8C'
            bodyStyle:
              type: string
              nullable: true
              example: Encoded in the model series
            engineCode:
              type: string
              nullable: true
              example: 5.0L V8 (Coyote)
            assemblyPlant:
              type: string
              nullable: true
              example: Flat Rock, MI (Mustang)
            productionYear:
              type: integer
              nullable: true
              example: 2015
            productionMonth:
              type: string
              nullable: true
              example: null
            errorMessage:
              type: string
              nullable: true
              example: null
            checkDigit:
              $ref: '#/components/schemas/VinCheckDigitResponse'
            warnings:
              type: array
              items:
                type: string
              example: []
            external:
              type: object
              additionalProperties: true
              example: []
    paths:
      /api/auth/login:
        post:
          summary: Log in and receive a JWT token
          operationId: authLogin
          tags:
            - Authentication
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  required: [email, password]
                  properties:
                    email:
                      type: string
                      format: email
                      example: admin@example.com
                    password:
                      type: string
                      format: password
                      example: secret123
          responses:
            '200':
              description: JWT token issued.
              content:
                application/json:
                  schema:
                    type: object
                    properties:
                      token:
                        type: string
                        example: eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiJ9...
            '401':
              description: Invalid credentials.
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/ErrorResponse'
  areas:
    default:
      path_patterns:
        - ^/api
        - ^/health
